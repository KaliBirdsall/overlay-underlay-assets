<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    font-family: sans-serif;
  }

  .control-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 15vh;
    background: #000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 48px;
    padding-bottom: 20px;
    z-index: 9998;
  }

  .btn {
    width: 35px;
    height: 35px;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .btn img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .btn:active {
    transform: scale(0.93);
  }

  .start-label {
    position: fixed;
    bottom: 10vh;
    left: 0;
    right: 0;
    width: 100%;
    text-align: center;
    color: #fff;
    font-size: 18px;
    letter-spacing: 1px;
    opacity: 0.8;
    z-index: 9998;
  }

  .start-label.hidden { display: none; }

  a-scene {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 75vh;
  }
</style>

<!-- MindAR + A-Frame -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <div class="start-label" id="startLabel">Touch play to start</div>

  <a-scene
    mindar-image="imageTargetSrc: https://raw.githubusercontent.com/KaliBirdsall/overlay-underlay-assets/refs/heads/main/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets>
      <img id="xrayImg" src="https://raw.githubusercontent.com/KaliBirdsall/overlay-underlay-assets/refs/heads/main/david_painting_xray.png" />
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-plane
        id="xrayImage"
        src="#xrayImg"
        position="0 0 0"
        width="1.0"
        height="1.35"
        visible="false"
        opacity="1"
        material="transparent: true; alphaTest: 0.1;"
      ></a-plane>
    </a-entity>

  </a-scene>

  <div class="control-bar">

    <button class="btn" id="playBtn" onclick="handlePlay()">
      <img id="iconPlay" src="https://raw.githubusercontent.com/KaliBirdsall/overlay-underlay-assets/refs/heads/main/play1.svg" alt="Play" />
      <img id="iconPause" src="https://raw.githubusercontent.com/KaliBirdsall/overlay-underlay-assets/refs/heads/main/pause1.svg" alt="Pause" style="display:none" />
      <img id="iconReplay" src="https://raw.githubusercontent.com/KaliBirdsall/overlay-underlay-assets/refs/heads/main/replay1.svg" alt="Replay" style="display:none" />
    </button>

    <button class="btn" id="xrayBtn" onclick="handleXray()" style="display:none">
      <img id="iconXrayOff" src="https://raw.githubusercontent.com/KaliBirdsall/overlay-underlay-assets/refs/heads/main/xrayOFF1.svg" alt="X-Ray Off" />
      <img id="iconXrayOn" src="https://raw.githubusercontent.com/KaliBirdsall/overlay-underlay-assets/refs/heads/main/xrayON1.svg" alt="X-Ray On" style="display:none" />
    </button>

  </div>

<script>
  let isPlaying = false;
  let xrayOn = false;
  let narrationEnded = false;
  let audio = null;

  function handlePlay() {
    if (narrationEnded) {
      resetToStart();
      return;
    }
    if (!isPlaying) {
      startNarration();
    } else {
      pauseNarration();
    }
  }

  function startNarration() {
    isPlaying = true;
    document.getElementById('startLabel').classList.add('hidden');
    document.getElementById('iconPlay').style.display = 'none';
    document.getElementById('iconPause').style.display = 'block';
    document.getElementById('xrayBtn').style.display = 'flex';

    if (!audio) {
      audio = new Audio('https://raw.githubusercontent.com/KaliBirdsall/overlay-underlay-assets/refs/heads/main/abracadabra.mp3');
      audio.onended = onNarrationEnd;
    }
    audio.play();
  }

  function pauseNarration() {
    isPlaying = false;
    document.getElementById('iconPlay').style.display = 'block';
    document.getElementById('iconPause').style.display = 'none';
    if (audio) audio.pause();
  }

  function onNarrationEnd() {
    isPlaying = false;
    narrationEnded = true;
    document.getElementById('iconPlay').style.display = 'none';
    document.getElementById('iconPause').style.display = 'none';
    document.getElementById('iconReplay').style.display = 'block';
  }

  function handleXray() {
    xrayOn = !xrayOn;
    const xrayImage = document.getElementById('xrayImage');
    if (xrayOn) {
      document.getElementById('iconXrayOff').style.display = 'none';
      document.getElementById('iconXrayOn').style.display = 'block';
      xrayImage.setAttribute('visible', 'true');
    } else {
      document.getElementById('iconXrayOff').style.display = 'block';
      document.getElementById('iconXrayOn').style.display = 'none';
      xrayImage.setAttribute('visible', 'false');
    }
  }

  function resetToStart() {
    isPlaying = false;
    narrationEnded = false;
    xrayOn = false;
    document.getElementById('startLabel').classList.remove('hidden');
    document.getElementById('iconPlay').style.display = 'block';
    document.getElementById('iconPause').style.display = 'none';
    document.getElementById('iconReplay').style.display = 'none';
    document.getElementById('xrayBtn').style.display = 'none';
    document.getElementById('iconXrayOff').style.display = 'block';
    document.getElementById('iconXrayOn').style.display = 'none';
    document.getElementById('xrayImage').setAttribute('visible', 'false');
    if (audio) { audio.pause(); audio.currentTime = 0; }
  }
</script>

</body>
</html>
